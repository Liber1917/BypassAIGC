# 自托管 AI Code Review — 使用 Gemini API
# 触发条件：PR 打开/同步

name: ai-code-review
on:
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:

jobs:
  review:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get PR diff
        id: diff
        run: |
          git fetch origin ${{ github.event.pull_request.base.ref }}
          DIFF=$(git diff origin/${{ github.event.pull_request.base.ref }} -- \
            ':!.github/workflows/' \
            ':!package/backend/tests/' \
            ':!package/frontend/package-lock.json' \
            ':!*.lock' 2>/dev/null | head -3000)
          # 限制 diff 长度，避免 token 爆炸
          echo "diff<<EOF" >> $GITHUB_OUTPUT
          echo "$DIFF" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: AI Review
        id: ai_review
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          DIFF: ${{ steps.diff.outputs.diff }}
        run: |
          if [ -z "$GEMINI_API_KEY" ]; then
            echo "review=GEMINI_API_KEY not configured" >> $GITHUB_OUTPUT
            exit 0
          fi
          if [ -z "$DIFF" ]; then
            echo "review=No diff to review" >> $GITHUB_OUTPUT
            exit 0
          fi

          # 用 jq 构造请求体
          PROMPT="你是一个严格的代码审查者。审查以下 PR diff，按优先级输出问题：

          ## 优先级检查

          ### P0 (必须修复)
          - SSE 路由中 ?token= 参数是否被 Depends() 提前 401 导致无法到达？
          - print() 中是否有 emoji 字符？(⚠️ ✅ ❌ 🚀 🛑)
          - Query(None) 声明的参数在 get_current_user() 调用中是否缺失？

          ### P1 (建议修复)
          - 前端是否使用了 localStorage 而非 sessionStorage？
          - 版本号是否不一致？
          - 注释/文档与实际实现是否矛盾？

          ### P2 (风格)
          - 死代码/不可达分支
          - 异常处理是否合理

          输出格式：每行一个 [P0/P1/P2] + 文件名:行号 + 问题描述

          Diff:
          ${DIFF}"

          REQUEST_BODY=$(jq -n --arg prompt "$PROMPT" '{
            "contents": [{
              "parts": [{"text": $prompt}]
            }]
          }')

          RESPONSE=$(curl -s -X POST \
            "https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-pro:generateContent?key=${GEMINI_API_KEY}" \
            -H "Content-Type: application/json" \
            -d "$REQUEST_BODY")

          REVIEW_TEXT=$(echo "$RESPONSE" | python3 -c "
          import sys, json
          data = json.load(sys.stdin)
          try:
              text = data['candidates'][0]['content']['parts'][0]['text']
              print(text[:4000])
          except:
              print('Review generation failed')
          " 2>/dev/null || echo "Review parse failed")

          echo "review<<EOF" >> $GITHUB_OUTPUT
          echo "$REVIEW_TEXT" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Post Review Comment
        uses: actions/github-script@v7
        with:
          script: |
            const review = `${{ steps.ai_review.outputs.review }}`;
            if (!review || review.includes('not configured')) {
              console.log('Review skipped:', review);
              return;
            }
            const body = `## 🤖 AI Code Review\n\n${review}\n\n---\n*Reviewed by Gemini 2.5 Pro*`;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: body
            });
