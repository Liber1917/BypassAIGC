# 自托管 AI Code Review — 使用 DeepSeek 官方 API
# 触发条件：PR 打开/同步

name: ai-code-review
on:
  pull_request:
    types: [opened, synchronize, reopened]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  review:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get PR diff
        id: diff
        run: |
          git fetch origin ${{ github.event.pull_request.base.ref }}
          DIFF=$(git diff origin/${{ github.event.pull_request.base.ref }} -- \
            ':!.github/workflows/' \
            ':!package/backend/tests/' \
            ':!package/frontend/package-lock.json' \
            ':!*.lock' 2>/dev/null | head -3000)
          echo "diff<<EOF" >> $GITHUB_OUTPUT
          echo "$DIFF" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: AI Review via DeepSeek
        id: ai_review
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          DIFF: ${{ steps.diff.outputs.diff }}
        run: |
          if [ -z "$DEEPSEEK_API_KEY" ]; then
            echo "review not configured" > /tmp/review.txt
            exit 0
          fi
          if [ -z "$DIFF" ]; then
            echo "no diff to review" > /tmp/review.txt
            exit 0
          fi

          PROMPT="你是一个严格的代码审查者。审查以下 PR diff，按优先级输出问题：

          ## 优先级检查

          ### P0 (必须修复)
          - SSE 路由中 ?token= 参数是否被 Depends() 提前 401 导致无法到达？
          - print()/logging 中是否有 emoji 字符？
          - Query(None) 声明的参数在 get_current_user() 调用中是否缺失？
          - localStroage 是否被使用（必须用 sessionStorage）？

          ### P1 (建议修复)
          - 版本号是否不一致？
          - 注释/文档与实际实现是否矛盾？

          ### P2 (风格)
          - 死代码/不可达分支
          - 异常处理是否合理

          输出格式：每行一个 [P0/P1/P2] + 文件名:行号 + 问题描述。无问题则不输出。

          Diff:
          ${DIFF}"

          REQUEST_BODY=$(jq -n --arg prompt "$PROMPT" '{
            "model": "deepseek-chat",
            "messages": [
              {"role": "system", "content": "你是一个严格的 Python/JavaScript 代码审查者，关注安全性、正确性和健壮性。使用中文回复。"},
              {"role": "user", "content": $prompt}
            ],
            "temperature": 0.1,
            "max_tokens": 2000
          }')

          RESPONSE=$(curl -s -X POST \
            "https://api.deepseek.com/v1/chat/completions" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${DEEPSEEK_API_KEY}" \
            -d "$REQUEST_BODY")

          echo "$RESPONSE" | python3 -c "
          import sys, json
          data = json.load(sys.stdin)
          try:
              text = data['choices'][0]['message']['content']
              print(text[:4000])
          except Exception as e:
              print(f'Review parse failed: {e}')
              import sys; sys.stderr.write(json.dumps(data, indent=2)[:500])
          " > /tmp/review.txt 2>/dev/null

      - name: Post Review Comment
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const review = fs.readFileSync('/tmp/review.txt', 'utf8').trim();
            if (!review || review.includes('not configured') || review.includes('no diff') || !context.issue.number) {
              if (!context.issue.number) console.log('Not a PR - skipping');
              else console.log('Review skipped:', review);
              return;
            }
            const body = '## AI Code Review\n\n' + review + '\n\n---\n*Reviewed by DeepSeek*';
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: body
            });
