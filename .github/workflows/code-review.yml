name: code-review
on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install isort
        run: pip install isort

      - name: Check for GBK-unsafe emoji in Python files
        run: |
          BAD=$(grep -rn '⚠️\|✅\|❌\|🛑\|🚀\|🌐\|✓\|✗\|👋' \
            --include="*.py" . 2>/dev/null || true)
          if [ -n "$BAD" ]; then
            echo "::error::Emoji found in Python files (GBK crash risk):"
            echo "$BAD"
            exit 1
          fi
          echo "No GBK-unsafe emoji found."

      - name: Check for localStorage in frontend
        run: |
          BAD=$(grep -rn "localStorage" package/frontend/src/ \
            --include="*.js" --include="*.jsx" 2>/dev/null || true)
          if [ -n "$BAD" ]; then
            echo "::error::localStorage found (use sessionStorage):"
            echo "$BAD"
            exit 1
          fi
          echo "All storage uses sessionStorage."

      - name: Check SSE token dead code
        run: |
          BAD=$(grep -B5 "if token and not" package/backend/app/routes/optimization.py 2>/dev/null || true)
          if [ -n "$BAD" ]; then
            echo "::warning::Possible dead code: SSE token check after Depends"
            echo "$BAD"
          fi

      - name: Check import order (isort)
        run: |
          cd package/backend
          isort --check-only app/ --diff --profile black 2>&1 \
            | head -60 || true
          # 只警告不阻止（避免一次 PR 修太多文件）
          echo "::warning::Import ordering issues may exist. Run 'isort app/' locally to fix."

      - name: Check for deprecated utcnow()
        run: |
          BAD=$(grep -rn "utcnow\|utcfromtimestamp" \
            --include="*.py" package/backend/app/ 2>/dev/null || true)
          if [ -n "$BAD" ]; then
            echo "::warning::Deprecated datetime.utcnow() found (py3.14+):"
            echo "$BAD"
          fi

      - name: Check for deprecated on_event
        run: |
          BAD=$(grep -rn "@app.on_event" \
            --include="*.py" package/ backend/app/ 2>/dev/null || true)
          if [ -n "$BAD" ]; then
            echo "::warning::Deprecated @app.on_event found (use lifespan handlers):"
            echo "$BAD"
          fi
